<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LT 問い合わせ返信メール生成 v2</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --bg: #F7F6F3; --surface: #FFFFFF; --surface2: #F2F1EE;
  --border: #E2E0DB; --border2: #D0CEC9;
  --text: #1C1B19; --text2: #6B6860; --text3: #9E9C97;
  --accent: #2B5CE6; --accent-bg: #EEF2FD;
  --green: #1A7A4A; --green-bg: #E8F5EE;
  --red: #C0392B; --red-bg: #FDECEA;
  --radius: 10px; --radius-sm: 6px;
  --font: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic UI", sans-serif;
}
body { font-family: var(--font); background: var(--bg); color: var(--text); font-size: 14px; line-height: 1.6; min-height: 100vh; }
.container { max-width: 780px; margin: 0 auto; padding: 2rem 1.25rem 4rem; }

.header { margin-bottom: 2rem; padding-bottom: 1.25rem; border-bottom: 1px solid var(--border); display: flex; align-items: flex-start; justify-content: space-between; gap: 1rem; }
.header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.02em; }
.header p { font-size: 13px; color: var(--text2); margin-top: 3px; }
.version-badge { font-size: 11px; background: var(--accent-bg); color: var(--accent); padding: 3px 8px; border-radius: 20px; font-weight: 600; white-space: nowrap; }

.steps { display: flex; margin-bottom: 1.5rem; background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.step { flex: 1; padding: 10px 12px; font-size: 12px; font-weight: 600; color: var(--text3); display: flex; align-items: center; gap: 6px; border-right: 1px solid var(--border); transition: all 0.2s; }
.step:last-child { border-right: none; }
.step.active { color: var(--accent); background: var(--accent-bg); }
.step.done { color: var(--green); background: var(--green-bg); }
.step-num { width: 20px; height: 20px; border-radius: 50%; background: var(--border); color: var(--text2); font-size: 11px; font-weight: 700; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
.step.active .step-num { background: var(--accent); color: #fff; }
.step.done .step-num { background: var(--green); color: #fff; }

.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 1rem; overflow: hidden; }
.card-header { padding: 12px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); font-size: 12px; font-weight: 700; color: var(--text2); letter-spacing: 0.05em; text-transform: uppercase; display: flex; align-items: center; gap: 8px; }
.card-body { padding: 16px; }

.paste-area { width: 100%; min-height: 180px; padding: 12px; font-size: 13px; font-family: var(--font); color: var(--text); background: var(--surface); border: 1.5px solid var(--border); border-radius: var(--radius-sm); resize: vertical; line-height: 1.6; transition: border-color 0.15s; }
.paste-area:focus { outline: none; border-color: var(--accent); }
.paste-area::placeholder { color: var(--text3); }

.parse-btn { width: 100%; padding: 11px; background: var(--text); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 14px; font-weight: 600; cursor: pointer; margin-top: 10px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; font-family: var(--font); }
.parse-btn:hover { background: #333; }
.parse-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.field-grid.single { grid-template-columns: 1fr; }
.field-grid.triple { grid-template-columns: 1fr 1fr 1fr; }
.field { display: flex; flex-direction: column; gap: 4px; }
.field label { font-size: 11px; font-weight: 600; color: var(--text2); letter-spacing: 0.03em; text-transform: uppercase; }
.field input, .field select { padding: 8px 10px; font-size: 13px; font-family: var(--font); color: var(--text); background: var(--surface2); border: 1px solid var(--border); border-radius: var(--radius-sm); transition: border-color 0.15s; }
.field input:focus, .field select:focus { outline: none; border-color: var(--accent); background: var(--surface); }

.pattern-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.pattern-btn { padding: 12px 14px; border: 1.5px solid var(--border); border-radius: var(--radius-sm); background: var(--surface); cursor: pointer; text-align: left; transition: all 0.15s; font-family: var(--font); }
.pattern-btn:hover { border-color: var(--accent); background: var(--accent-bg); }
.pattern-btn.selected { border-color: var(--accent); background: var(--accent-bg); }
.p-num { font-size: 10px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em; text-transform: uppercase; margin-bottom: 2px; }
.p-title { font-size: 13px; font-weight: 600; color: var(--text); margin-bottom: 2px; }
.p-desc { font-size: 11px; color: var(--text2); line-height: 1.4; }

.generate-btn { width: 100%; padding: 13px; background: var(--accent); color: #fff; border: none; border-radius: var(--radius-sm); font-size: 15px; font-weight: 700; cursor: pointer; margin-top: 4px; display: flex; align-items: center; justify-content: center; gap: 6px; transition: background 0.15s; font-family: var(--font); }
.generate-btn:hover { background: #1e4acc; }
.generate-btn:disabled { background: var(--border2); color: var(--text3); cursor: not-allowed; }

.loading-bar { display: none; flex-direction: column; align-items: center; gap: 8px; padding: 1.5rem; color: var(--text2); font-size: 13px; }
.loading-bar.visible { display: flex; }
.spinner { width: 28px; height: 28px; border: 2.5px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }

.result-section { display: none; }
.result-section.visible { display: block; }
.result-card { background: var(--surface); border: 1.5px solid var(--green); border-radius: var(--radius); overflow: hidden; }
.result-head { background: var(--green-bg); padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #C3E6D2; }
.result-head-label { font-size: 13px; font-weight: 700; color: var(--green); }
.btn-row { display: flex; gap: 8px; }
.action-btn { font-size: 12px; padding: 6px 12px; border-radius: var(--radius-sm); border: 1px solid var(--border2); background: var(--surface); color: var(--text); cursor: pointer; font-family: var(--font); font-weight: 500; transition: background 0.15s; }
.action-btn:hover { background: var(--surface2); }
.action-btn.primary { background: var(--text); color: #fff; border-color: var(--text); }
.action-btn.primary:hover { background: #333; }
.result-body-inner { padding: 16px; }
.subject-row { font-size: 13px; color: var(--text2); padding-bottom: 12px; margin-bottom: 12px; border-bottom: 1px solid var(--border); }
.subject-row strong { color: var(--text); font-weight: 600; }
.mail-text { font-size: 14px; color: var(--text); line-height: 1.9; white-space: pre-wrap; }

.error-box { display: none; background: var(--red-bg); border: 1px solid #F5C6C2; border-radius: var(--radius-sm); padding: 12px; font-size: 13px; color: var(--red); margin-bottom: 1rem; }
.error-box.visible { display: block; }
.section-divider { height: 1px; background: var(--border); margin: 1.25rem 0; }
.parsed-badge { font-size: 11px; background: var(--green-bg); color: var(--green); padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.reset-link { background: none; border: none; font-size: 12px; color: var(--text3); cursor: pointer; text-decoration: underline; font-family: var(--font); display: block; text-align: center; margin-top: 12px; }
.reset-link:hover { color: var(--text2); }

@media (max-width: 560px) {
  .field-grid, .field-grid.triple { grid-template-columns: 1fr; }
  .pattern-grid { grid-template-columns: 1fr; }
  .header { flex-direction: column; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div>
      <h1>LT 問い合わせ返信メール生成</h1>
      <p>問い合わせ内容を貼り付けるだけで、パターン別の返信メールを自動生成します</p>
    </div>
    <span class="version-badge">v2.0</span>
  </div>

  <div class="steps">
    <div class="step active" id="step1-ind"><div class="step-num">1</div>貼り付け・解析</div>
    <div class="step" id="step2-ind"><div class="step-num">2</div>内容確認・設定</div>
    <div class="step" id="step3-ind"><div class="step-num">3</div>メール生成</div>
  </div>

  <div class="error-box" id="error-box"></div>

  <!-- STEP 1 -->
  <div id="step1-section">
    <div class="card">
      <div class="card-header">📋 STEP 1 — 問い合わせ内容を貼り付け</div>
      <div class="card-body">
        <textarea class="paste-area" id="raw-input" placeholder="問い合わせフォームの内容をそのままここに貼り付けてください。

会社名・担当者名・イベント名・日程・言語などを自動で読み取ります。
フォーマットが違っても問題ありません。"></textarea>
        <button class="parse-btn" id="parse-btn" onclick="parseInquiry()">✦ 内容を自動解析する</button>
      </div>
    </div>
  </div>

  <!-- STEP 2 -->
  <div id="step2-section" style="display:none;">
    <div class="card">
      <div class="card-header">
        ✓ 解析結果を確認
        <span class="parsed-badge">✓ 自動入力済み</span>
      </div>
      <div class="card-body">
        <div class="field-grid">
          <div class="field"><label>会社名 *</label><input type="text" id="company"></div>
          <div class="field"><label>部署名</label><input type="text" id="department"></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>担当者名 *</label><input type="text" id="contact_name"></div>
          <div class="field"><label>送信担当者 *</label>
            <select id="sender"><option value="立花">立花</option><option value="石﨑">石﨑</option></select>
          </div>
        </div>
        <div class="section-divider"></div>
        <div class="field-grid">
          <div class="field"><label>イベント名</label><input type="text" id="event_name"></div>
          <div class="field"><label>開催日程</label><input type="text" id="event_date"></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>会場</label><input type="text" id="venue"></div>
          <div class="field"><label>予定参加者数</label><input type="text" id="attendees"></div>
        </div>
        <div class="field-grid">
          <div class="field"><label>発話言語</label><input type="text" id="languages"></div>
          <div class="field"><label>開催形式</label><input type="text" id="format" placeholder="オフライン / オンライン / ハイブリッド"></div>
        </div>
        <div class="field-grid triple">
          <div class="field"><label>リハーサル</label>
            <select id="rehearsal"><option value="未回答">未回答</option><option value="あり">あり</option><option value="なし">なし</option></select>
          </div>
          <div class="field"><label>モニター出力</label>
            <select id="monitor"><option value="未回答">未回答</option><option value="あり">あり</option><option value="なし">なし</option></select>
          </div>
          <div class="field"><label>過去のAI翻訳サービス</label>
            <select id="past_service"><option value="なし">なし</option><option value="あり">あり</option><option value="未回答">未回答</option></select>
          </div>
        </div>
        <div class="field-grid single">
          <div class="field"><label>問い合わせ内容・備考</label><input type="text" id="notes" placeholder="コストを知りたい、専門用語の精度など"></div>
        </div>
      </div>
    </div>

    <div class="card">
      <div class="card-header">📝 返信パターンを選択</div>
      <div class="card-body">
        <div class="pattern-grid">
          <button class="pattern-btn selected" id="pat1" onclick="selectPattern(1)">
            <div class="p-num">パターン ①</div>
            <div class="p-title">ラフ返信（通常）</div>
            <div class="p-desc">日が経っていない・初回打診の標準メール</div>
          </button>
          <button class="pattern-btn" id="pat2" onclick="selectPattern(2)">
            <div class="p-num">パターン ②</div>
            <div class="p-title">日が経っている</div>
            <div class="p-desc">返信漏れのお詫び＋MTGへ持ち込む</div>
          </button>
          <button class="pattern-btn" id="pat3" onclick="selectPattern(3)">
            <div class="p-num">パターン ③</div>
            <div class="p-title">イベント直前（1週間以内）</div>
            <div class="p-desc">お詫び＋料金明示＋当日備品案内</div>
          </button>
          <button class="pattern-btn" id="pat4" onclick="selectPattern(4)">
            <div class="p-num">パターン ④</div>
            <div class="p-title">イベントまで余裕あり</div>
            <div class="p-desc">サービス詳細＋確認事項＋デモ提案</div>
          </button>
        </div>
        <div class="section-divider"></div>
        <button class="generate-btn" id="generate-btn" onclick="generateEmail()">✦ メールを生成する</button>
      </div>
    </div>
    <button class="reset-link" onclick="resetAll()">← 最初からやり直す</button>
  </div>

  <div class="loading-bar" id="loading"><div class="spinner"></div><span>メール文面を生成中...</span></div>

  <!-- STEP 3 -->
  <div class="result-section" id="result-section">
    <div class="result-card">
      <div class="result-head">
        <div class="result-head-label">✓ 生成完了</div>
        <div class="btn-row">
          <button class="action-btn" onclick="copyBody(this)">本文をコピー</button>
          <button class="action-btn primary" onclick="copyAll(this)">件名＋本文をコピー</button>
        </div>
      </div>
      <div class="result-body-inner">
        <div class="subject-row">件名：<strong id="result-subject"></strong></div>
        <div class="mail-text" id="result-body"></div>
      </div>
    </div>
    <button class="reset-link" onclick="resetAll()">← 最初からやり直す</button>
  </div>

</div>
<script>
const CALENDAR_URL = "https://timerex.net/s/ishizaki_bd66_52a9/6cc5b727";
let selectedPattern = 1;

function selectPattern(n) {
  selectedPattern = n;
  [1,2,3,4].forEach(i => document.getElementById('pat'+i).classList.toggle('selected', i===n));
}

function setStep(n) {
  [1,2,3].forEach(i => {
    const el = document.getElementById('step'+i+'-ind');
    el.classList.remove('active','done');
    if (i < n) el.classList.add('done');
    else if (i === n) el.classList.add('active');
  });
}

async function parseInquiry() {
  const raw = document.getElementById('raw-input').value.trim();
  if (!raw) { showError('問い合わせ内容を貼り付けてください。'); return; }
  const btn = document.getElementById('parse-btn');
  btn.disabled = true; btn.textContent = '解析中...'; hideError();

  const prompt = `以下の問い合わせテキストから情報を抽出してください。
見つからない項目は「なし」と答えてください。担当者名は敬称（様・さん等）を除いてください。
リハーサル・モニター出力・過去のAI翻訳サービス利用は「あり」「なし」「未回答」のいずれかのみで答えてください。

【問い合わせテキスト】
${raw}

以下の形式のみで出力し、前置きや説明は不要。各行を必ず出力すること：
COMPANY:会社名
DEPARTMENT:部署名
CONTACT:担当者名
EVENT:イベント名
DATE:開催日程
VENUE:会場
ATTENDEES:参加者数
LANGUAGES:発話言語
FORMAT:開催形式
REHEARSAL:リハーサル(あり/なし/未回答)
MONITOR:モニター出力(あり/なし/未回答)
PAST_SERVICE:過去のAI翻訳サービス利用(あり/なし/未回答)
NOTES:備考・問い合わせ内容`;

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:600, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const text = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");

    // キー:値形式で各フィールドを抽出（特殊文字に強い）
    const extract = (key) => {
      const m = text.match(new RegExp(`^${key}:(.*)$`, 'm'));
      const val = m ? m[1].trim() : '';
      return val === 'なし' ? '' : val;
    };
    const extractSelect = (key) => {
      const m = text.match(new RegExp(`^${key}:(.*)$`, 'm'));
      const val = m ? m[1].trim() : '未回答';
      return ['あり','なし','未回答'].includes(val) ? val : '未回答';
    };

    document.getElementById('company').value = extract('COMPANY');
    document.getElementById('department').value = extract('DEPARTMENT');
    document.getElementById('contact_name').value = extract('CONTACT');
    document.getElementById('event_name').value = extract('EVENT');
    document.getElementById('event_date').value = extract('DATE');
    document.getElementById('venue').value = extract('VENUE');
    document.getElementById('attendees').value = extract('ATTENDEES');
    document.getElementById('languages').value = extract('LANGUAGES');
    document.getElementById('format').value = extract('FORMAT');
    document.getElementById('notes').value = extract('NOTES');
    document.getElementById('rehearsal').value = extractSelect('REHEARSAL');
    document.getElementById('monitor').value = extractSelect('MONITOR');
    document.getElementById('past_service').value = extractSelect('PAST_SERVICE');

    document.getElementById('step1-section').style.display = 'none';
    document.getElementById('step2-section').style.display = 'block';
    setStep(2);
  } catch(e) {
    showError('解析中にエラーが発生しました。もう一度お試しください。');
    console.error(e);
  } finally {
    btn.disabled = false; btn.textContent = '✦ 内容を自動解析する';
  }
}

async function generateEmail() {
  const company = document.getElementById('company').value.trim();
  const contactName = document.getElementById('contact_name').value.trim();
  if (!company || !contactName) { showError('会社名と担当者名は必須です。'); return; }

  const f = {
    company, contactName,
    department: document.getElementById('department').value.trim(),
    sender: document.getElementById('sender').value,
    event_name: document.getElementById('event_name').value.trim(),
    event_date: document.getElementById('event_date').value.trim(),
    venue: document.getElementById('venue').value.trim(),
    attendees: document.getElementById('attendees').value.trim(),
    languages: document.getElementById('languages').value.trim(),
    format: document.getElementById('format').value.trim(),
    rehearsal: document.getElementById('rehearsal').value,
    monitor: document.getElementById('monitor').value,
    past_service: document.getElementById('past_service').value,
    notes: document.getElementById('notes').value.trim(),
  };

  const patterns = {
    1: `パターン①：ラフ返信（通常・日が経っていない初回打診）
- 担当者名・イベント情報を踏まえた自然な文面でMTGへ誘導
- 過去のAI翻訳サービス利用が「あり」の場合のみ「以前のご利用状況や課題感」に言及（「なし」「未回答」の場合は触れない）
- 件名：【フリットジャパン】お問い合わせいただきありがとうございます（Live Translation ご案内）`,
    2: `パターン②：日が経っている・返信漏れのお詫び＋MTGへ持ち込む
- 冒頭に確認漏れのお詫びを入れる
- イベント情報を踏まえた内容、参加人数による追加課金がない旨に言及
- お見積りに向けた確認事項リストを含める（ステージ数・会場入り時間・撤収時間・翻訳必要時間・前日リハーサル有無・会場名・住所）
- MTGへの誘導（カレンダーURL）
- 件名：【お詫びとご案内】Live Translationのお問い合わせにつきまして（フリットジャパン）`,
    3: `パターン③：イベント直前（1週間以内）・返信漏れのお詫び
- 冒頭に確認漏れのお詫びを入れる
- 開催まで1週間を切っている旨、他社で決まっている場合は放念くださいと記載
- 料金目安を明記：半日プラン298,000円（税抜）/1ステージ・1日プラン400,000円（税抜）/1ステージ、参加人数による追加課金なし、料金にはシステム利用料・AI事前トレーニング・当日専任スタッフ・機材一式・翻訳ログ提供が含まれる旨
- 当日必要なAVセットアップ4点：マイク音声出力線（XLR/キャノン）・有線LANケーブル・コンセント3口・机と椅子1〜2名分
- 件名：【お詫びとご案内】Live Translationのお問い合わせにつきまして（フリットジャパン）`,
    4: `パターン④：イベントまで余裕がある
- お詫びなし・丁寧なサービス説明
- 従来の同時通訳との違い：AIを活用・スマホがレシーバー・アプリ不要・QRコードのみで参加
- 会場側で用意いただく備品4点：マイク音声出力線（XLR/キャノン）・有線LANケーブル・コンセント3口・机と椅子1〜2名分
- お見積りに向けた確認事項リスト（ステージ数・会場入り時間・撤収時間・翻訳必要時間・前日リハーサル有無・会場名・住所またはエリア）
- デモ兼打ち合わせへの誘導（カレンダーURL）
- 件名：【ご案内】Live Translationのお問い合わせにつきまして（フリットジャパン）`,
  };

  const addrLine = `${f.company}${f.department ? '\n' + f.department : ''}\n${f.contactName}様`;

  const prompt = `あなたはフリットジャパン株式会社の営業担当・${f.sender}です。
以下の問い合わせ情報と指定パターンに従い、返信メールの件名と本文を生成してください。

【問い合わせ情報】
会社名：${f.company}
部署名：${f.department || '（未記入）'}
担当者名：${f.contactName}
イベント名：${f.event_name || '（未記入）'}
開催日程：${f.event_date || '（未記入）'}
会場：${f.venue || '（未記入）'}
参加者数：${f.attendees || '（未記入）'}
発話言語：${f.languages || '（未記入）'}
開催形式：${f.format || '（未記入）'}
リハーサル：${f.rehearsal}
モニター出力：${f.monitor}
過去のAI翻訳サービス利用：${f.past_service}
備考：${f.notes || '（なし）'}

【生成パターン】
${patterns[selectedPattern]}

【共通ルール】
- 署名は含めない（Gmailが自動挿入する）
- 本文は「${addrLine}」で書き始める
- 送信者名は「${f.sender}」を使用
- カレンダーURLは「${CALENDAR_URL}」をそのまま使用
- 備考に特記事項があればそれも踏まえた文面にする

以下のJSONのみ出力し、前置き・説明・マークダウン記号は一切不要：
{"subject":"件名テキスト","body":"本文テキスト（改行は\\nで表現）"}`;

  document.getElementById('generate-btn').disabled = true;
  document.getElementById('loading').classList.add('visible');
  document.getElementById('result-section').classList.remove('visible');
  hideError();

  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST", headers: {"Content-Type":"application/json"},
      body: JSON.stringify({ model:"claude-sonnet-4-6", max_tokens:1200, messages:[{role:"user",content:prompt}] })
    });
    const data = await res.json();
    const raw = data.content.filter(b=>b.type==="text").map(b=>b.text).join("");
    let subject = '', body = '';
    const jsonMatch = raw.match(/\{[\s\S]*\}/);
    if (jsonMatch) {
      try {
        const p = JSON.parse(jsonMatch[0]);
        subject = p.subject || '';
        body = typeof p.body === 'string' ? p.body.replace(/\\n/g,'\n') : '';
      } catch(e1) {
        const sm = raw.match(/"subject"\s*:\s*"([^"]+)"/);
        const bm = raw.match(/"body"\s*:\s*"([\s\S]+?)(?:"\s*\}|",\s*")/);
        subject = sm ? sm[1] : '（件名取得エラー）';
        body = bm ? bm[1].replace(/\\n/g,'\n') : raw;
      }
    } else {
      body = raw;
    }
    document.getElementById('result-subject').textContent = subject;
    document.getElementById('result-body').textContent = body;
    document.getElementById('result-section').classList.add('visible');
    setStep(3);
    document.getElementById('result-section').scrollIntoView({behavior:'smooth',block:'start'});
  } catch(e) {
    showError('生成中にエラーが発生しました。もう一度お試しください。');
  } finally {
    document.getElementById('generate-btn').disabled = false;
    document.getElementById('loading').classList.remove('visible');
  }
}

function copyBody(btn) {
  navigator.clipboard.writeText(document.getElementById('result-body').textContent).then(() => {
    btn.textContent = '✓ コピー完了';
    setTimeout(() => { btn.textContent = '本文をコピー'; }, 2000);
  });
}
function copyAll(btn) {
  const s = document.getElementById('result-subject').textContent;
  const b = document.getElementById('result-body').textContent;
  navigator.clipboard.writeText(`件名：${s}\n\n${b}`).then(() => {
    btn.textContent = '✓ コピー完了';
    setTimeout(() => { btn.textContent = '件名＋本文をコピー'; }, 2000);
  });
}
function showError(msg) { const e = document.getElementById('error-box'); e.textContent = msg; e.classList.add('visible'); }
function hideError() { document.getElementById('error-box').classList.remove('visible'); }
function resetAll() {
  document.getElementById('raw-input').value = '';
  document.getElementById('step1-section').style.display = 'block';
  document.getElementById('step2-section').style.display = 'none';
  document.getElementById('result-section').classList.remove('visible');
  document.getElementById('loading').classList.remove('visible');
  selectedPattern = 1; selectPattern(1); setStep(1); hideError();
  window.scrollTo({top:0,behavior:'smooth'});
}
</script>
</body>
</html>
